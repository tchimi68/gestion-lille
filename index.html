const fmt = (n, dec = 0) => Number(n || 0).toLocaleString('fr-FR', { maximumFractionDigits: dec, minimumFractionDigits: dec });

// ─── APPLICATION PRINCIPALE ───────────────────────────────────────────
function App() {
  const currentYear = new Date().getFullYear();
  const [selectedYear, setSelectedYear] = useState(currentYear);
  const [yearlyData, setYearlyData] = useState({});
  const [amortizations, setAmortizations] = useState(INITIAL_AMORTIZATIONS);
  const [tmi, setTmi] = useState(11);
  const [showLoanTable, setShowLoanTable] = useState(false);
  const [showProjection, setShowProjection] = useState(false);
  const [activeTab, setActiveTab] = useState('dashboard');
  const fileInputRef = useRef(null);
  const [activeExpenseId, setActiveExpenseId] = useState(null);

  // Persistance localStorage
  useEffect(() => {
    try {
      const saved = localStorage.getItem('lille_v3_data');
      const savedAmort = localStorage.getItem('lille_v3_amort');
      const savedTmi = localStorage.getItem('lille_v3_tmi');
      if (saved) setYearlyData(JSON.parse(saved));
      if (savedAmort) setAmortizations(JSON.parse(savedAmort));
      if (savedTmi) setTmi(parseInt(savedTmi));
    } catch(e) { console.error('Erreur chargement localStorage', e); }
  }, []);

  useEffect(() => {
    if (Object.keys(yearlyData).length > 0)
      localStorage.setItem('lille_v3_data', JSON.stringify(yearlyData));
  }, [yearlyData]);

  useEffect(() => { localStorage.setItem('lille_v3_amort', JSON.stringify(amortizations)); }, [amortizations]);
  useEffect(() => { localStorage.setItem('lille_v3_tmi', tmi.toString()); }, [tmi]);

  const getDefaultYearData = (year) => ({
    year,
    tenants: INITIAL_TENANTS,
    charges: DEFAULT_CHARGES.map((c, i) => ({ ...c, id: `c-${i}` })),
    expenses: [],
    taxes: 0,
    km: 3000,
  });

  const currentData = useMemo(() => {
    if (!yearlyData[selectedYear]) return getDefaultYearData(selectedYear);
    return { ...yearlyData[selectedYear], expenses: yearlyData[selectedYear].expenses || [] };
  }, [selectedYear, yearlyData]);

  const updateYearlyData = (newData, yearOverride) => {
    const targetYear = yearOverride ?? selectedYear;
    const targetData = yearlyData[targetYear] ?? getDefaultYearData(targetYear);
    setYearlyData(prev => ({ ...prev, [targetYear]: { ...targetData, ...newData } }));
  };

  // ── Overrides tableau de projection ──
  const handleOverrideChange = (year, field, value) => {
    const numValue = value === "" ? undefined : parseFloat(value);
    const existingOverrides = yearlyData[year]?.overrides ?? {};
    const newOverrides = { ...existingOverrides };
    if (numValue === undefined) delete newOverrides[field];
    else newOverrides[field] = numValue;
    updateYearlyData({ overrides: newOverrides }, year);
  };

  const clearOverride = (year, field) => handleOverrideChange(year, field, "");

  // ── Dépenses ──
  const addExpense = () => {
    const newExpense = {
      id: uid(), object: 'Nouvelle dépense', provider: '-',
      amount: 0, date: new Date().toISOString().split('T')[0]
    };
    updateYearlyData({ expenses: [...currentData.expenses, newExpense] });
  };

  const updateExpense = (id, updates) => {
    const updated = currentData.expenses.map(e => e.id === id ? { ...e, ...updates } : e);
    updateYearlyData({ expenses: updated });
  };

  const removeExpense = (id) => {
    updateYearlyData({ expenses: currentData.expenses.filter(e => e.id !== id) });
  };

  const handleFileUpload = (e) => {
    const file = e.target.files?.[0];
    if (file && activeExpenseId) {
      const reader = new FileReader();
      reader.onload = (event) => {
        updateExpense(activeExpenseId, { attachmentName: file.name, attachmentData: event.target.result });
        setActiveExpenseId(null);
      };
      reader.readAsDataURL(file);
    }
  };

  const exportToGmail = async (expense) => {
    const list = expense ? [expense] : currentData.expenses;
    const year = selectedYear;
    let summary = `Bonjour,\n\nRécapitulatif des charges Lille (${year}) :\n\n`;
    list.forEach(e => {
      summary += `- ${e.date} | ${e.provider} | ${e.object} | ${e.amount}€\n`;
    });
    summary += `\nTOTAL : ${list.reduce((acc, e) => acc + (e.amount || 0), 0)}€\n\nCordialement.`;
    const subject = expense ? `Facture ${expense.provider} - ${expense.object} (${year})` : `Charges Lille ${year}`;
    const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(summary)}`;
    window.open(gmailUrl, '_blank');
  };

  const exportCSV = () => {
    const rows = [['Date','Fournisseur','Objet','Montant']];
    currentData.expenses.forEach(e => rows.push([e.date, e.provider, e.object, e.amount]));
    const csv = rows.map(r => r.join(';')).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `charges_lille_${selectedYear}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  // ── Calcul emprunt ──
  const loanSchedule = useMemo(() => {
    const { amount, monthlyPayment, taeg, startDate, endDate } = LOAN_INITIAL;
    const monthlyRate = taeg / 12;
    let balance = amount, schedule = [];
    let d = new Date(startDate);
    const end = new Date(endDate);
    while (balance > 0.01 && d <= end) {
      const interest = balance * monthlyRate;
      const principal = monthlyPayment - interest;
      balance = Math.max(0, balance - principal);
      schedule.push({ date: new Date(d), interest, principal, balance, payment: monthlyPayment });
      d.setMonth(d.getMonth() + 1);
    }
    return schedule;
  }, []);

  const getYearlyLoanInterests = (year) =>
    loanSchedule.filter(s => s.date.getFullYear() === year).reduce((acc, s) => acc + s.interest, 0);

  const getTenantRevenue = (t, year) => {
    const entryDate = new Date(t.entryDate);
    const exitDate = t.exitDate ? new Date(t.exitDate) : null;
    let hc = 0, cc = 0;
    for (let m = 0; m < 12; m++) {
      const d = new Date(year, m, 15);
      if (d >= entryDate && (!exitDate || d <= exitDate)) {
        const rent = m < 6 ? t.rentHC1 : t.rentHC2;
        hc += rent; cc += rent + t.charges;
      }
    }
    return { hc, cc };
  };

  const getYearlyAmortization = (year) =>
    amortizations.reduce((acc, a) =>
      year >= a.startYear && year < a.startYear + a.duration ? acc + a.annualAmount : acc, 0);

  // ── Projection fiscale ──
  const projectionData = useMemo(() => {
    const results = [];
    let stockAmortEcartes = 0;
    for (let y = 2022; y <= 2062; y++) {
      const dataForYear = yearlyData[y];
      const overrides = dataForYear?.overrides ?? {};
      const yearlyInterestsForY = getYearlyLoanInterests(y);

      let projExpensesSum = 0;
      if (dataForYear?.expenses?.length > 0) {
        projExpensesSum = dataForYear.expenses.reduce((acc, ex) => acc + (ex.amount || 0), 0);
      } else {
        const pastYears = Object.keys(yearlyData).map(Number).filter(k => k < y).sort((a, b) => b - a);
        let found = false;
        for (const py of pastYears) {
          if (yearlyData[py].expenses?.length > 0) {
            projExpensesSum = yearlyData[py].expenses.reduce((acc, ex) => acc + (ex.amount || 0), 0);
            found = true; break;
          }
        }
        if (!found) projExpensesSum = DEFAULT_CHARGES.reduce((acc, c) => acc + c.value, 0);
      }

      const tenants = dataForYear ? dataForYear.tenants : currentData.tenants;
      const revCC_auto = tenants.reduce((acc, t) => acc + getTenantRevenue(t, y).cc, 0);
      const amortAnnee_auto = getYearlyAmortization(y);

      const revCC = overrides.revenus ?? revCC_auto;
      const opCharges = overrides.charges ?? projExpensesSum;
      const totalChargesForFiscal = opCharges + yearlyInterestsForY;
      const amortAnnee = overrides.amortAnnee ?? amortAnnee_auto;
      const stockAnterieur = overrides.stockAnterieur ?? stockAmortEcartes;
      const profitAvantAmort = revCC - totalChargesForFiscal;

      let amortUtiliseAnnee_auto = 0, amortEcarteAnnee_auto = 0, amortImputeSurStock_auto = 0, resultatFiscal_auto = 0;
      if (profitAvantAmort > 0) {
        amortUtiliseAnnee_auto = Math.min(profitAvantAmort, amortAnnee);
        amortEcarteAnnee_auto = amortAnnee - amortUtiliseAnnee_auto;
        const resteAImputer = profitAvantAmort - amortUtiliseAnnee_auto;
        amortImputeSurStock_auto = Math.min(resteAImputer, stockAnterieur);
        resultatFiscal_auto = resteAImputer - amortImputeSurStock_auto;
      } else {
        amortEcarteAnnee_auto = amortAnnee;
      }

      const amortUtiliseAnnee = overrides.amortUtiliseAnnee ?? amortUtiliseAnnee_auto;
      const amortEcarteAnnee = overrides.amortEcarteAnnee ?? amortEcarteAnnee_auto;
      const resultatFiscal = overrides.resultatFiscal ?? resultatFiscal_auto;
      const impots_auto = resultatFiscal > 0 ? resultatFiscal * (tmi / 100 + 0.172) : 0;
      const impots = overrides.impots ?? impots_auto;
      const amortImputeEffective = overrides.resultatFiscal !== undefined
        ? Math.max(0, (revCC - totalChargesForFiscal) - amortUtiliseAnnee - resultatFiscal)
        : amortImputeSurStock_auto;
      const stockFin_auto = stockAnterieur - amortImputeEffective + amortEcarteAnnee;
      const stockFin = overrides.stockFin ?? stockFin_auto;

      results.push({
        year: y, revenus: revCC, revenus_auto: revCC_auto,
        opCharges, interests: yearlyInterestsForY, amortAnnee, amortAnnee_auto,
        amortUtiliseAnnee, amortUtiliseAnnee_auto, amortEcarteAnnee, amortEcarteAnnee_auto,
        stockAnterieur, stockFin, stockFin_auto, resultatFiscal, resultatFiscal_auto,
        impots, impots_auto, overrides
      });
      stockAmortEcartes = stockFin;
    }
    return results;
  }, [yearlyData, currentData, amortizations, loanSchedule, tmi]);

  const cashFlowChartData = useMemo(() => {

  const currentYearProjection = projectionData.find(p => p.year === selectedYear) || {};

  const amortizationByYearChart = useMemo(() => {

      year: y,
      amount: amortizations.reduce((acc, a) =>

    };

  const removeTenant = (id) =>

  const updateTenant = (id, updates) => {

    if (name && !isNaN(startYear) && !isNaN(total) && duration > 0) {
      setAmortizations(prev => [...prev, {
        id: uid(), type: name, annualAmount: total / duration,
        totalToAmortize: total, startYear, duration
      }]);
      e.target.reset();
    }
  };

    setAmortizations(prev => prev.map(a => {
      if (a.id !== id) return a;
      const next = { ...a, ...updates };
      if (updates.totalToAmortize !== undefined || updates.duration !== undefined)

              <div className="px-6 py-3 bg-rose-50/50 border-b border-slate-100 flex items-center justify-between">

              <div className="overflow-x-auto">

              </div>
            </div>

            <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
              <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between cursor-pointer"
                onClick={() => setShowLoanTable(!showLoanTable)}>
                <div className="flex items-center gap-2">
                  <Icon d={ICONS.banknotes} size={5} cls="text-indigo-500" />
                  <h2 className="font-bold text-slate-800">Tableau d'amortissement détaillé (TAEG 0.9%)</h2>
                </div>
                <span className="text-xs font-bold text-indigo-600">{showLoanTable ? 'Masquer' : 'Afficher'}</span>
              </div>
              {showLoanTable && (
                <div className="overflow-x-auto max-h-[500px] overflow-y-auto">
                  <table className="w-full text-left text-xs">
                    <thead className="sticky top-0 bg-white z-10 border-b border-slate-100">
                      <tr className="bg-slate-50 text-[9px] uppercase font-black text-slate-400 tracking-widest">
                        <th className="px-6 py-3">Mois</th>
                        <th className="px-4 py-3">Échéance</th>
                        <th className="px-4 py-3">Intérêts</th>
                        <th className="px-4 py-3">Capital</th>
                        <th className="px-6 py-3 text-right">Capital restant</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-50">
                      {loanSchedule.map((s, idx) => (
                        <tr key={idx} className={`hover:bg-slate-50 ${s.date.getFullYear() === selectedYear ? 'bg-indigo-50/30' : ''}`}>
                          <td className="px-6 py-2 font-bold text-slate-600">
                            {s.date.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' })}
                          </td>
                          <td className="px-4 py-2 text-slate-500">{fmt(s.payment, 2)} €</td>
                          <td className="px-4 py-2 text-rose-500 font-medium">{fmt(s.interest, 2)} €</td>
                          <td className="px-4 py-2 text-emerald-600 font-medium">{fmt(s.principal, 2)} €</td>
                          <td className="px-6 py-2 text-right font-black text-slate-700">{fmt(s.balance, 2)} €</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </div>
        )}
      </main>

      <footer className="text-center py-8 mt-12 opacity-30">
        <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">
          Gestion Privée — Résidence Lille · LMNP Réel
        </p>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
